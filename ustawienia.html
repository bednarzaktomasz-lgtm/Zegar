<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustawienia</title>
  <link rel="stylesheet" href="clock-styles.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 1200px;
      height: 1920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 0 64px;
    }

    .topbar {
      width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .icon-btn {
      width: 56px;
      height: 56px;
      cursor: pointer;
      color: #555;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:hover { color: #f0f0f0; }

    #clockContainer .clock {
      width: 700px;
      height: 700px;
    }

    #clockContainer .clock .numbers .num { font-size: 42px; }
    #clockContainer .clock .digital-time  { font-size: 18px; }
    #clockContainer .clock .digital-date  { font-size: 10px; }
    #clockContainer .clock .brand         { font-size: 22px; }

    /* Help hint */
    .hint-area {
      flex: 1;
      margin: 0 28px;
      color: #888;
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .hint-area.active { opacity: 1; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .help-btn {
      width: 56px;
      height: 56px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 2.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      line-height: 1;
    }
    .help-btn:hover,
    .help-btn.active {
      color: #f0f0f0;
    }

    /* ---- Controls row: bg icons + hand color icons ---- */
    .controls-row {
      width: 1100px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 100px;
    }

    .controls-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .controls-label {
      color: #888;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Override bg-btn size for the settings page */
    #bgControlsContainer .bg-controls {
      margin-top: 0;
      gap: 20px;
    }

    #bgControlsContainer .bg-controls .bg-btn {
      width: 64px;
      height: 64px;
    }

    /* Hand color dots — same shape as bg-btn */
    .hand-controls {
      display: flex;
      gap: 20px;
    }

    .hand-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #333;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .hand-btn:hover {
      transform: scale(1.1);
      border-color: #d82928;
    }

    .hand-btn.active {
      border-color: #d82928;
      box-shadow: 0 0 10px rgba(216, 41, 40, 0.4);
    }

    .hand-btn.h-white { background: #f0f0f0; }
    .hand-btn.h-blue  { background: #2563eb; }
    .hand-btn.h-red   { background: #d82928; }

    /* ---- Settings panel ---- */
    .settings-panel {
      width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-section-label {
      color: #888;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }

    .mode-toggles {
      display: flex;
      gap: 16px;
    }

    .mode-toggle {
      flex: 1;
      height: 100px;
      background: #111;
      border: 2px solid #222;
      border-radius: 16px;
      color: #888;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-toggle:hover  { background: #222; color: #f0f0f0; }
    .mode-toggle.active { background: #2563eb; border-color: #2563eb; color: white; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
      background: #111;
      border: 2px solid #222;
      border-radius: 16px;
      padding: 0 36px;
    }

    .toggle-row span {
      color: #f0f0f0;
      font-size: 1.6rem;
      font-weight: 600;
    }

    .toggle-switch {
      width: 80px;
      height: 44px;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-switch.active {
      background: #2563eb;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      top: 4px;
      left: 4px;
      transition: left 0.2s;
    }

    .toggle-switch.active::after {
      left: 40px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="start.html" title="Wróć do menu">
    <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </a>
  <div class="hint-area" id="hintArea">Ustaw domyślne opcje dla trybu quizu i ustawiania godziny.</div>
  <div class="topbar-right">
    <button class="help-btn" id="helpBtn">?</button>
  </div>
</div>

<div id="clockContainer"></div>

<div class="controls-row">
  <div class="controls-group">
    <div class="controls-label">Tarcza</div>
    <div id="bgControlsContainer"></div>
  </div>
  <div class="controls-group">
    <div class="controls-label">Wskazówki</div>
    <div class="hand-controls">
      <div class="hand-btn h-white active" data-color="white" title="Białe"></div>
      <div class="hand-btn h-blue" data-color="blue" title="Niebieskie"></div>
      <div class="hand-btn h-red" data-color="red" title="Czerwone"></div>
    </div>
  </div>
</div>

<div class="settings-panel">

  <div class="settings-section">
    <div class="settings-section-label">Tryb czasu</div>
    <div class="mode-toggles">
      <button class="mode-toggle active" data-mode="full">Pełne godziny</button>
      <button class="mode-toggle" data-mode="half">Połówki (30 min)</button>
      <button class="mode-toggle" data-mode="quarter">Kwadranse (15, 45 min)</button>
      <button class="mode-toggle" data-mode="five">Co 5 minut</button>
      <button class="mode-toggle" data-mode="any">Każda minuta</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-label">Opcje</div>
    <div class="toggle-row">
      <span>Dźwięki</span>
      <div class="toggle-switch active" id="soundToggle"></div>
    </div>
    <div class="toggle-row">
      <span>Podpowiedź czasu</span>
      <div class="toggle-switch active" id="timeHintToggle"></div>
    </div>
  </div>

</div>

<script src="clock-renderer.js"></script>
<script>
  // ==================== localStorage Keys ====================
  const STORAGE_KEYS = {
    activeModes: 'zegar_activeModes',
    soundEnabled: 'zegar_soundEnabled',
    showTimeHint: 'zegar_showTimeHint',
    clockBg: 'zegar_clockBg',
    handColor: 'zegar_handColor',
  };

  // ==================== Defaults ====================
  const DEFAULTS = {
    activeModes: ['full'],
    soundEnabled: true,
    showTimeHint: true,
    clockBg: 'solid',
    handColor: 'white',
  };

  // ==================== Load Settings ====================
  function loadSettings() {
    return {
      activeModes: JSON.parse(localStorage.getItem(STORAGE_KEYS.activeModes)) || DEFAULTS.activeModes,
      soundEnabled: localStorage.getItem(STORAGE_KEYS.soundEnabled) !== 'false',
      showTimeHint: localStorage.getItem(STORAGE_KEYS.showTimeHint) !== 'false',
      clockBg: localStorage.getItem(STORAGE_KEYS.clockBg) || DEFAULTS.clockBg,
      handColor: localStorage.getItem(STORAGE_KEYS.handColor) || DEFAULTS.handColor,
    };
  }

  // ==================== DOM References ====================
  const clockContainer = document.getElementById("clockContainer");
  const bgControlsContainer = document.getElementById("bgControlsContainer");
  const modeToggles = document.querySelectorAll('.mode-toggle');
  const handBtns = document.querySelectorAll('.hand-btn');
  const soundToggle = document.getElementById('soundToggle');
  const timeHintToggle = document.getElementById('timeHintToggle');
  const helpBtn = document.getElementById('helpBtn');
  const hintArea = document.getElementById('hintArea');

  // ==================== Initialize Settings ====================
  const settings = loadSettings();

  // ==================== Initialize Clock ====================
  const clock = new ClockRenderer(clockContainer, {
    size: 'normal',
    interactive: true,
    showBrand: true,
    showDigital: true,
    showDate: true,
    showSecondHand: true,
    showBgControls: true,
    bgControlsContainer: bgControlsContainer,
    handColor: settings.handColor,
  });

  // ==================== Apply Settings to UI ====================
  // Mode toggles
  modeToggles.forEach(btn => {
    btn.classList.toggle('active', settings.activeModes.includes(btn.dataset.mode));
  });

  // Hand color buttons
  handBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.color === settings.handColor);
  });

  // Background buttons (rendered by ClockRenderer)
  setTimeout(() => {
    const bgBtns = bgControlsContainer.querySelectorAll('.bg-btn');
    bgBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.bg === settings.clockBg);
    });
    clock.setBackground(settings.clockBg);
  }, 0);

  // Toggle switches
  soundToggle.classList.toggle('active', settings.soundEnabled);
  timeHintToggle.classList.toggle('active', settings.showTimeHint);

  // ==================== Event Listeners ====================

  // Mode toggles (multi-select)
  modeToggles.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const activeModes = Array.from(modeToggles)
        .filter(b => b.classList.contains('active'))
        .map(b => b.dataset.mode);
      // Ensure at least one mode is active
      if (activeModes.length === 0) {
        btn.classList.add('active');
        activeModes.push(btn.dataset.mode);
      }
      localStorage.setItem(STORAGE_KEYS.activeModes, JSON.stringify(activeModes));
    });
  });

  // Hand color buttons (single-select)
  handBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      handBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const color = btn.dataset.color;
      localStorage.setItem(STORAGE_KEYS.handColor, color);
      clock.setHandColor(color);
    });
  });

  // Background buttons — inject listener after ClockRenderer creates them
  setTimeout(() => {
    const bgBtns = bgControlsContainer.querySelectorAll('.bg-btn');
    bgBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        localStorage.setItem(STORAGE_KEYS.clockBg, btn.dataset.bg);
      });
    });
  }, 0);

  // Sound toggle
  soundToggle.addEventListener('click', () => {
    soundToggle.classList.toggle('active');
    const enabled = soundToggle.classList.contains('active');
    localStorage.setItem(STORAGE_KEYS.soundEnabled, enabled);
  });

  // Time hint toggle
  timeHintToggle.addEventListener('click', () => {
    timeHintToggle.classList.toggle('active');
    const enabled = timeHintToggle.classList.contains('active');
    localStorage.setItem(STORAGE_KEYS.showTimeHint, enabled);
  });

  // Help button
  helpBtn.addEventListener('click', () => {
    hintArea.classList.toggle('active');
    helpBtn.classList.toggle('active');
  });
</script>

</body>
</html>
