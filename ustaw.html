<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustaw Godzinę</title>
    <link rel="stylesheet" href="clock-styles.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #f0f0f0;
            width: 1200px;
            height: 1920px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 48px 0 64px;
        }

        /* Top bar */
        .topbar {
            width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            width: 56px;
            height: 56px;
            cursor: pointer;
            color: #555;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-btn:hover { color: #f0f0f0; }

        .settings-icon {
            transition: color 0.2s, transform 0.2s;
        }

        .settings-icon:hover {
            transform: rotate(90deg);
        }

        /* Clock */
        #clockContainer .clock {
            width: 700px;
            height: 700px;
        }

        #clockContainer .clock .numbers .num {
            font-size: 42px;
        }

        #clockContainer .clock .digital-time {
            font-size: 18px;
        }

        #clockContainer .clock .digital-date {
            font-size: 10px;
        }

        #clockContainer .clock .brand {
            font-size: 22px;
        }

        /* Target & info panel */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 700px;
        }

        .target-display {
            background: #111;
            border: 2px solid #222;
            border-radius: 24px;
            text-align: center;
            color: #f0f0f0;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .target-display:hover {
            background: #1a1a1a;
            border-color: #444;
        }

        .target-display:active {
            background: #222;
        }

        .target-display.correct {
            background: #16a34a;
            border-color: #16a34a;
        }

        .target-display.wrong {
            background: #dc2626;
            border-color: #dc2626;
        }

        .target-label {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 600;
        }

        .target-time {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .user-time-display {
            text-align: center;
            height: 100px;
            background: #111;
            border: 2px solid #222;
            border-radius: 24px;
            font-size: 1.6rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: opacity 0.3s;
        }

        .user-time-display.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .user-time-display strong {
            color: #f0f0f0;
            font-size: 2rem;
        }

        /* Feedback & score */
        .bottom-info {
            width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feedback {
            font-size: 1.8rem;
            font-weight: 600;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .feedback.success { color: #16a34a; }
        .feedback.error   { color: #dc2626; }

        .score {
            font-size: 1.8rem;
            font-weight: 600;
            color: #555;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #111;
            border: 2px solid #222;
            border-radius: 24px;
            padding: 48px;
            min-width: 600px;
            display: grid;
            gap: 20px;
        }

        .modal-modes {
            display: grid;
            gap: 16px;
        }

        .mode-toggle {
            padding: 24px 28px;
            border: 2px solid #333;
            background: #1a1a1a;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: #f0f0f0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-toggle:hover  { background: #222; }
        .mode-toggle.active { background: #2563eb; border-color: #2563eb; color: white; }

        .sound-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 28px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 16px;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-switch {
            width: 72px;
            height: 36px;
            background: #333;
            border-radius: 18px;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: #16a34a;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(36px);
        }

        /* Help hint */
        .hint-area {
            flex: 1;
            margin: 0 28px;
            color: #888;
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .hint-area.active { opacity: 1; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .help-btn {
            width: 56px;
            height: 56px;
            border: none;
            background: transparent;
            color: #555;
            font-size: 2.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
            padding: 0;
            line-height: 1;
        }
        .help-btn:hover,
        .help-btn.active {
            color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="start.html" title="Wróć do menu">
            <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        <div class="hint-area" id="hintArea">Ustaw wskazówki zegara na podaną godzinę, a następnie kliknij przycisk z godziną, aby sprawdzić.</div>
        <div class="topbar-right">
            <button class="help-btn" id="helpBtn">?</button>
            <svg class="icon-btn settings-icon" id="settingsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l-4.24-4.24M19.78 19.78l-4.24-4.24m5.08-5.08l-4.24-4.24"></path>
            </svg>
        </div>
    </div>

    <div id="clockContainer"></div>

    <div class="info-panel">
        <div class="target-display" id="targetDisplay">
            <div class="target-time" id="targetTime">12:00</div>
        </div>

        <div class="user-time-display" id="userTimeDisplay">
            Twoja godzina: <strong id="userTime">12:00</strong>
        </div>
    </div>

    <div class="bottom-info">
        <div class="feedback" id="feedback"></div>
        <div class="score" id="score">Wynik: 0 / 0</div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-modes">
                <button class="mode-toggle active" data-mode="full">Pełne godziny</button>
                <button class="mode-toggle" data-mode="half">Połówki (30 min)</button>
                <button class="mode-toggle" data-mode="quarter">Kwadranse (15, 45 min)</button>
                <button class="mode-toggle" data-mode="five">Co 5 minut</button>
                <button class="mode-toggle" data-mode="any">Każda minuta</button>
            </div>
            <div class="sound-toggle" id="soundToggleRow">
                <span>Dźwięki</span>
                <div class="toggle-switch active" id="soundToggle"></div>
            </div>
            <div class="sound-toggle" id="timeHintToggleRow">
                <span>Podpowiedź czasu</span>
                <div class="toggle-switch active" id="timeHintToggle"></div>
            </div>
        </div>
    </div>

    <script src="clock-renderer.js"></script>
    <script>
        // ==================== Load Global Settings ====================
        const STORAGE_KEYS = {
            activeModes: 'zegar_activeModes',
            soundEnabled: 'zegar_soundEnabled',
            showTimeHint: 'zegar_showTimeHint',
            clockBg: 'zegar_clockBg',
            handColor: 'zegar_handColor',
        };

        function loadGlobalSettings() {
            return {
                activeModes: JSON.parse(localStorage.getItem(STORAGE_KEYS.activeModes)) || ['full'],
                soundEnabled: localStorage.getItem(STORAGE_KEYS.soundEnabled) !== 'false',
                showTimeHint: localStorage.getItem(STORAGE_KEYS.showTimeHint) !== 'false',
                clockBg: localStorage.getItem(STORAGE_KEYS.clockBg) || 'solid',
                handColor: localStorage.getItem(STORAGE_KEYS.handColor) || 'white',
            };
        }

        const globalSettings = loadGlobalSettings();

        // ==================== Initialize Clock ====================
        const clockContainer = document.getElementById("clockContainer");
        let hasMovedHand = false;
        let isChecked = false;

        const clock = new ClockRenderer(clockContainer, {
            size: 'normal',
            interactive: true,
            showBrand: true,
            showDigital: true,
            showDate: true,
            showSecondHand: false,
            showBgControls: false,
            handColor: globalSettings.handColor,
            onTimeChange: (h, m) => {
                if (!hasMovedHand) {
                    hasMovedHand = true;
                }
                updateUserTimeDisplay();
            }
        });

        // Apply saved background
        clock.setBackground(globalSettings.clockBg);

        // ==================== Game State ====================
        let targetTime = { h: 12, m: 0 };
        let correctAnswers = 0;
        let totalAnswers = 0;
        let soundEnabled = globalSettings.soundEnabled;
        let showTimeHint = globalSettings.showTimeHint;
        let activeModes = new Set(globalSettings.activeModes);
        let audioContext = null;

        // ==================== Mode Configuration ====================
        const MODE_MINUTES = {
            full: [0],
            half: [30],
            quarter: [15, 45],
            five: [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55],
            any: Array.from({ length: 60 }, (_, i) => i),
        };

        const TOLERANCE_MAP = {
            full: 5,
            half: 4,
            quarter: 3,
            five: 2,
            any: 2,
        };

        // ==================== DOM Elements ====================
        const targetTimeEl = document.getElementById("targetTime");
        const targetDisplay = document.getElementById("targetDisplay");
        const userTimeEl = document.getElementById("userTime");
        const feedbackEl = document.getElementById("feedback");
        const scoreEl = document.getElementById("score");
        const settingsIcon = document.getElementById("settingsIcon");
        const settingsModal = document.getElementById("settingsModal");
        const soundToggle = document.getElementById("soundToggle");
        const timeHintToggle = document.getElementById("timeHintToggle");
        const userTimeDisplay = document.getElementById("userTimeDisplay");

        // ==================== Sync UI to Global Settings ====================
        document.querySelectorAll('.mode-toggle').forEach(btn => {
            btn.classList.toggle('active', activeModes.has(btn.dataset.mode));
        });
        soundToggle.classList.toggle('active', soundEnabled);
        timeHintToggle.classList.toggle('active', showTimeHint);
        userTimeDisplay.classList.toggle('hidden', !showTimeHint);

        // ==================== Audio Setup ====================
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playBeep(frequency, duration) {
            if (!soundEnabled) return;
            
            initAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playSuccess() { playBeep(880, 150); }
        function playError() { playBeep(220, 300); }

        // ==================== Time Functions ====================
        function formatTime(hour, minute) {
            const h = String(hour).padStart(2, "0");
            const m = String(minute).padStart(2, "0");
            return `${h}:${m}`;
        }

        function randomMinute() {
            const allMinutes = new Set();
            activeModes.forEach((mode) => {
                MODE_MINUTES[mode].forEach((m) => allMinutes.add(m));
            });
            const minutesArray = Array.from(allMinutes);
            return minutesArray[Math.floor(Math.random() * minutesArray.length)];
        }

        function getCurrentTolerance() {
            let minTolerance = 10;
            activeModes.forEach((mode) => {
                if (TOLERANCE_MAP[mode] < minTolerance) {
                    minTolerance = TOLERANCE_MAP[mode];
                }
            });
            return minTolerance;
        }

        function checkAnswerWithTolerance(userH, userM, correctH, correctM, toleranceMinutes) {
            const userTotal = ((userH - 1) % 12 + 1) === 12 ? (userM === 0 ? 0 : 12 * 60 + userM) : ((userH - 1) % 12) * 60 + userM;
            const correctTotal = ((correctH - 1) % 12 + 1) === 12 ? (correctM === 0 ? 0 : 12 * 60 + correctM) : ((correctH - 1) % 12) * 60 + correctM;
            
            let diff = Math.abs(userTotal - correctTotal);
            if (diff > 360) diff = 720 - diff;
            
            return diff <= toleranceMinutes;
        }

        function updateUserTimeDisplay() {
            const time = clock.getTime();
            userTimeEl.textContent = formatTime(time.h, time.m);
        }

        // ==================== Game Logic ====================
        function startNewQuestion() {
            const hour = Math.floor(Math.random() * 12) + 1;
            const minute = randomMinute();
            targetTime = { h: hour, m: minute };
            
            // Reset clock to 12:00
            clock.setTime(12, 0);
            clock.hideGhostHands();
            
            // Update displays
            targetTimeEl.textContent = formatTime(targetTime.h, targetTime.m);
            updateUserTimeDisplay();
            
            // Reset UI
            isChecked = false;
            hasMovedHand = false;
            feedbackEl.textContent = '';
            feedbackEl.className = 'feedback';
            targetDisplay.classList.remove('correct', 'wrong');
        }

        function handleCheck() {
            if (isChecked || !hasMovedHand) return;
            
            initAudioContext();
            isChecked = true;
            totalAnswers++;
            
            const userTime = clock.getTime();
            const tolerance = getCurrentTolerance();
            const isCorrect = checkAnswerWithTolerance(
                userTime.h, userTime.m,
                targetTime.h, targetTime.m,
                tolerance
            );
            
            if (isCorrect) {
                correctAnswers++;
                feedbackEl.textContent = `🎉 Świetnie!`;
                feedbackEl.className = 'feedback success';
                targetDisplay.classList.add('correct');
                playSuccess();
            } else {
                feedbackEl.textContent = `❌ Nie tym razem.`;
                feedbackEl.className = 'feedback error';
                targetDisplay.classList.add('wrong');
                playError();
                clock.showGhostHands(targetTime.h, targetTime.m);
            }
            
            scoreEl.textContent = `Wynik: ${correctAnswers} / ${totalAnswers}`;
            
            setTimeout(startNewQuestion, 2000);
        }

        // ==================== Click target to check ====================
        targetDisplay.addEventListener("click", handleCheck);

        // ==================== Modal & Settings ====================
        settingsIcon.addEventListener("click", () => {
            settingsModal.classList.add("active");
        });

        settingsModal.addEventListener("click", (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove("active");
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                settingsModal.classList.remove("active");
            }
        });

        document.querySelectorAll(".mode-toggle").forEach((btn) => {
            btn.addEventListener("click", () => {
                const mode = btn.dataset.mode;
                if (activeModes.has(mode)) {
                    if (activeModes.size > 1) {
                        activeModes.delete(mode);
                        btn.classList.remove("active");
                    }
                } else {
                    activeModes.add(mode);
                    btn.classList.add("active");
                }
            });
        });

        soundToggle.addEventListener("click", () => {
            soundEnabled = !soundEnabled;
            soundToggle.classList.toggle("active");
            if (soundEnabled) {
                initAudioContext();
                playBeep(660, 100);
            }
        });

        timeHintToggle.addEventListener("click", () => {
            showTimeHint = !showTimeHint;
            timeHintToggle.classList.toggle("active");
            userTimeDisplay.classList.toggle("hidden", !showTimeHint);
        });

        const helpBtn = document.getElementById('helpBtn');
        const hintArea = document.getElementById('hintArea');
        helpBtn.addEventListener('click', () => {
            hintArea.classList.toggle('active');
            helpBtn.classList.toggle('active');
        });

        // ==================== Initialize ====================
        startNewQuestion();
    </script>
</body>
</html>
